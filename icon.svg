<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Full bleed background for maskable safe zone -->
  <rect width="512" height="512" fill="#0b57d0"/>
  <!-- Subtle glass layer -->
  <rect x="40" y="40" width="432" height="432" rx="72" fill="rgba(255,255,255,0.10)"/>
  <!-- Bracket lines -->
  <g stroke="rgba(255,255,255,0.50)" stroke-width="18" stroke-linecap="round" fill="none">
    <path d="M150 170 L110 170 L110 342 L150 342"/>
    <path d="M362 170 L402 170 L402 342 L362 342"/>
    <line x1="110" y1="256" x2="150" y2="256"/>
    <line x1="362" y1="256" x2="402" y2="256"/>
  </g>
  <!-- Center trophy/star -->
  <text x="256" y="286" font-family="'Helvetica Neue',Arial,sans-serif" font-size="140" font-weight="800" text-anchor="middle" fill="white" letter-spacing="-2">BT</text>
  <text x="256" y="340" font-family="'Helvetica Neue',Arial,sans-serif" font-size="44" font-weight="500" text-anchor="middle" fill="rgba(255,255,255,0.72)" letter-spacing="4">NCAA</text>
</svg>
